name: Telegram Sync — Cập nhật kế hoạch

on:
  schedule:
    - cron: '*/30 * * * *'   # Chạy mỗi 30 phút
  workflow_dispatch:           # Chạy thủ công nếu cần

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run Telegram sync
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python .github/scripts/telegram_sync.py

      - name: Commit & push changes
        run: |
          git config user.name  "Telegram Bot 🤖"
          git config user.email "bot@noreply.github.com"
          git add actionplan.json .github/telegram_offset.txt
          if git diff --cached --quiet; then
            echo "Không có thay đổi, bỏ qua commit."
          else
            git commit -m "📋 Cập nhật kế hoạch từ Telegram"
            git push origin main
          fi
