name: Zalo Sync — Cập nhật kế hoạch (polling — DỰ PHÒNG)

# LƯU Ý: Cách polling này hay timeout vì GitHub Actions (Mỹ) kết nối kém tới
# server Zalo (VN). Đã chuyển sang webhook qua Cloudflare Worker (xem thư mục
# cloudflare-worker/). Workflow này chỉ giữ lại để chạy tay khi cần — đã TẮT cron.
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-zalo-bot

      - name: Run Zalo sync
        env:
          ZALO_BOT_TOKEN: ${{ secrets.ZALO_BOT_TOKEN }}
          ZALO_CHAT_ID: ${{ secrets.ZALO_CHAT_ID }}
        run: python .github/scripts/zalo_sync.py

      - name: Commit & push changes
        run: |
          git config user.name  "Zalo Bot 🤖"
          git config user.email "bot@noreply.github.com"
          git add actionplan.json calendar_notes.json
          git add .github/zalo_offset.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Không có thay đổi, bỏ qua commit."
          else
            git commit -m "📋 Cập nhật kế hoạch từ Zalo"
            git push origin main
          fi
